<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Saju Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; background:#f2f2f2; font-family:sans-serif; }
.container {
  max-width:420px; margin:40px auto; padding:20px;
  border:1px solid black; background:white;
}
.block { margin-top:15px; }
label { font-size:13px; display:block; margin-bottom:5px; }
input, select, button, textarea {
  width:100%; padding:10px; border:1px solid black;
  box-sizing:border-box;
}
button { margin-top:10px; background:black; color:white; }
.hidden { display:none; }

/* 복사 완료 텍스트 */
.copy-msg {
  text-align:center;
  margin-top:5px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<button id="langBtn">🌐 한국어 / English</button>

<h2 id="title"></h2>

<div class="block">
<label id="birthLabel"></label>
<input type="date" id="birthDate">
</div>

<div class="block">
<label id="timeLabel"></label>

<select id="timeMode">
<option value="none"></option>
<option value="exact"></option>
<option value="range"></option>
</select>

<input type="time" id="exactTime" class="hidden">

<select id="timeRange" class="hidden">
<option value="23">자시 (23~01)</option>
<option value="1">축시 (01~03)</option>
<option value="3">인시 (03~05)</option>
<option value="5">묘시 (05~07)</option>
<option value="7">진시 (07~09)</option>
<option value="9">사시 (09~11)</option>
<option value="11">오시 (11~13)</option>
<option value="13">미시 (13~15)</option>
<option value="15">신시 (15~17)</option>
<option value="17">유시 (17~19)</option>
<option value="19">술시 (19~21)</option>
<option value="21">해시 (21~23)</option>
</select>

</div>

<button id="calcBtn"></button>

<div id="result" style="margin-top:20px;"></div>

<div style="margin-top:20px;">
  <textarea id="promptBox" style="height:150px;"></textarea>

  <div id="copyArea" class="hidden">
    <button id="copyBtn"></button>
    <div id="copyMsg" class="copy-msg"></div>
  </div>
</div>

</div>

<script>

// ===== 상태 =====
const state = {
  lang: "ko",
  result: null
};

// ===== i18n =====
const TEXT = {
  ko: {
    title:"사주 계산기",
    birth:"생년월일",
    time:"출생 시간",
    calc:"계산",
    copy:"프롬프트 복사",
    copied:"복사 완료",
    modes:["모름","정확한 시간","시간대 선택"],
    result:(d,h,t,tp)=>`
      <b>일주:</b> ${d}<br>
      <b>시주:</b> ${h}<br><br>
      <b>오늘 (${t}) 일주:</b> ${tp}
    `,
    prompt:(d,h,t,tp)=>`나의 일간은 '${d}'이고, 시주는 '${h}'이야.
오늘은 '${t}'이고, 오늘 일주는 '${tp}'이야.

연애, 인간관계, 금전, 직장/취업 운세 분석해줘.`
  },
  en: {
    title:"Saju Calculator",
    birth:"Birth Date",
    time:"Birth Time",
    calc:"Calculate",
    copy:"Copy Prompt",
    copied:"Copied",
    modes:["Unknown","Exact Time","Time Range"],
    result:(d,h,t,tp)=>`
      <b>Day:</b> ${d}<br>
      <b>Hour:</b> ${h}<br><br>
      <b>Today (${t}) Day:</b> ${tp}
    `,
    prompt:(d,h,t,tp)=>`My day pillar is '${d}' and hour pillar is '${h}'.
Today is '${t}', and today's day pillar is '${tp}'.

Analyze love, relationships, money, and career.`
  }
};

// ===== DOM =====
const el = {
  title, birthLabel, timeLabel, calcBtn,
  timeMode, exactTime, timeRange, result, promptBox,
  copyBtn, copyMsg, copyArea
};

// ===== UI =====
function renderUI(){
  const t = TEXT[state.lang];

  el.title.innerText = t.title;
  el.birthLabel.innerText = t.birth;
  el.timeLabel.innerText = t.time;
  el.calcBtn.innerText = t.calc;
  el.copyBtn.innerText = t.copy;

  [...el.timeMode.options].forEach((opt,i)=>{
    opt.text = t.modes[i];
  });
}

// ===== 이벤트 =====
langBtn.onclick = ()=>{
  state.lang = state.lang==="ko" ? "en" : "ko";
  renderUI();
};

timeMode.onchange = ()=>{
  exactTime.classList.toggle("hidden", timeMode.value!=="exact");
  timeRange.classList.toggle("hidden", timeMode.value!=="range");
};

calcBtn.onclick = calc;
copyBtn.onclick = copyPrompt;

// ===== 핵심 계산 =====
const stems=["갑","을","병","정","무","기","경","신","임","계"];
const branches=["자","축","인","묘","진","사","오","미","신","유","술","해"];
const cycle = Array.from({length:60},(_,i)=>stems[i%10]+branches[i%12]);

// 🔥 핵심 수정 (정오 기준)
const baseUTC = Date.UTC(1984,1,2,12);

function getDayPillar(y,m,d){
  const target = Date.UTC(y,m-1,d,12);
  const diff = Math.floor((target-baseUTC)/(1000*60*60*24));
  let idx = diff%60;
  if(idx<0) idx+=60;
  return cycle[idx];
}

function getTodayPillar(){
  const now = new Date();
  return getDayPillar(
    now.getFullYear(),
    now.getMonth()+1,
    now.getDate()
  );
}

function getHourPillar(hour,dayStem){
  const hb = Math.floor((hour+1)/2)%12;
  const ds = stems.indexOf(dayStem);
  const hs = (ds*2 + hb)%10;
  return stems[hs]+branches[hb];
}

// ===== 실행 =====
function calc(){

  if(!birthDate.value) return;

  const [y,m,d]=birthDate.value.split("-").map(Number);

  let hour = 12;

  if(timeMode.value==="exact"){
    hour = parseInt(exactTime.value.split(":")[0]);
  }
  if(timeMode.value==="range"){
    hour = parseInt(timeRange.value);
  }

  const day = getDayPillar(y,m,d);
  const hourP = getHourPillar(hour,day[0]);

  const today = new Date().toISOString().split("T")[0];
  const todayP = getTodayPillar();

  state.result = {day, hour:hourP, today, todayP};

  renderResult();
  renderPrompt();

  // 버튼 등장
  copyArea.classList.remove("hidden");
}

// ===== 출력 =====
function renderResult(){
  const t = TEXT[state.lang];

  result.innerHTML = t.result(
    state.result.day,
    state.result.hour,
    state.result.today,
    state.result.todayP
  );
}

function renderPrompt(){
  const t = TEXT[state.lang];

  promptBox.value = t.prompt(
    state.result.day,
    state.result.hour,
    state.result.today,
    state.result.todayP
  );
}

// ===== 복사 =====
function copyPrompt(){
  navigator.clipboard.writeText(promptBox.value);

  el.copyMsg.innerText = TEXT[state.lang].copied;

  setTimeout(()=>{
    el.copyMsg.innerText = "";
  },1500);
}

// 초기화
renderUI();

</script>

</body>
</html>
