<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Day Pillar Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: -apple-system, sans-serif;
  background: #f5f6f8;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 20px;
  width: 360px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: black;
  color: white;
  cursor: pointer;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

.small {
  font-size: 12px;
  color: #666;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="card">

<button onclick="toggleLang()">ENG / KOR</button>

<h3 id="title">일주 계산기</h3>

<p id="todayText"></p>
<p id="todayPillar"></p>

<hr>

<input type="date" id="birthDate">

<select id="calcMode">
  <option value="modern">일반 방식 (자정 기준)</option>
  <option value="traditional">전통 방식 (자시 기준)</option>
</select>

<select id="zasiMode">
  <option value="normal">자시 (23~01 통합)</option>
  <option value="early">조자시 (23~00 → 다음날)</option>
  <option value="late">야자시 (00~01 → 이전날)</option>
</select>

<button onclick="calculate()" id="calcBtn">계산하기</button>

<p id="result"></p>

<div class="small" id="desc"></div>

</div>

<script>
const stems = ["갑","을","병","정","무","기","경","신","임","계"];
const branches = ["자","축","인","묘","진","사","오","미","신","유","술","해"];

const sexagenary = Array.from({ length: 60 }, (_, i) =>
  stems[i % 10] + branches[i % 12]
);

// 기준일: 2026-04-10 = 갑인
const baseDate = new Date("2026-04-10");
const baseIndex = sexagenary.indexOf("갑인");

let lang = "ko";

const text = {
  ko: {
    title: "일주 계산기",
    today: "오늘 날짜",
    todayPillar: "오늘 일주",
    result: "당신의 일주",
    btn: "계산하기",
    desc: "※ 전통 방식은 자시(23시)를 기준으로 날짜가 바뀝니다.\n※ 조자시: 다음날, 야자시: 이전날로 계산됩니다."
  },
  en: {
    title: "Day Pillar Calculator",
    today: "Today",
    todayPillar: "Today's Day Pillar",
    result: "Your Day Pillar",
    btn: "Calculate",
    desc: "※ Traditional method uses 23:00 as day boundary.\n※ Early Zi = next day, Late Zi = previous day."
  }
};

function updateText() {
  document.getElementById("title").innerText = text[lang].title;
  document.getElementById("calcBtn").innerText = text[lang].btn;
  document.getElementById("desc").innerText = text[lang].desc;
}

function toggleLang() {
  lang = lang === "ko" ? "en" : "ko";
  updateText();
}

function getDayPillar(date, mode, zasiMode) {
  let d = new Date(date);

  if (mode === "traditional") {
    const hour = d.getHours();

    if (hour >= 23) {
      if (zasiMode === "early" || zasiMode === "normal") {
        d.setDate(d.getDate() + 1);
      }
    } else if (hour < 1) {
      if (zasiMode === "late") {
        d.setDate(d.getDate() - 1);
      }
    }
  }

  const diff = Math.floor((d - baseDate) / (1000 * 60 * 60 * 24));
  let index = (baseIndex + diff) % 60;
  if (index < 0) index += 60;

  return sexagenary[index];
}

function calculate() {
  const input = document.getElementById("birthDate").value;
  const mode = document.getElementById("calcMode").value;
  const zasiMode = document.getElementById("zasiMode").value;

  if (!input) return alert("날짜 입력");

  const date = new Date(input);
  const result = getDayPillar(date, mode, zasiMode);

  document.getElementById("result").innerText =
    text[lang].result + ": " + result;
}

// 오늘 표시
const today = new Date();
document.getElementById("todayText").innerText =
  text[lang].today + ": " + today.toLocaleDateString();

document.getElementById("todayPillar").innerText =
  text[lang].todayPillar + ": " +
  getDayPillar(today, "modern", "normal");

updateText();
</script>

</body>
</html>
