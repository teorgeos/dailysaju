<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>정통 사주 계산기 (절기 반영)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { margin:0; background:#f4f7f6; font-family:'Pretendard', sans-serif; color:#333; }
  .container { max-width:450px; margin:20px auto; padding:25px; border-radius:15px; background:white; box-shadow:0 10px 25px rgba(0,0,0,0.1); }
  h2 { text-align:center; color:#2c3e50; margin-bottom:25px; }
  .block { margin-bottom:15px; }
  label { font-size:14px; font-weight:600; display:block; margin-bottom:8px; color:#555; }
  input, select, button, textarea { width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box; font-size:15px; }
  button { margin-top:15px; background:#2c3e50; color:white; border:none; cursor:pointer; font-weight:bold; transition:0.3s; }
  button:hover { background:#1a252f; }
  .result-card { background:#f9f9f9; padding:15px; border-radius:10px; border-left:5px solid #2c3e50; margin-top:20px; line-height:1.6; }
  .hidden { display:none; }
  textarea { height:120px; background:#fffef0; border:1px dashed #ccc; margin-top:15px; font-size:13px; }
</style>
</head>
<body>

<div class="container">
  <h2 id="title">명리 사주 계산기</h2>

  <div class="block">
    <label>생년월일</label>
    <input type="date" id="birthDate">
  </div>

  <div class="block">
    <label>태어난 시간 (23시 이후는 다음날 일주 적용)</label>
    <select id="timeRange">
      <option value="0">자시 (23:30 ~ 01:29)</option>
      <option value="2">축시 (01:30 ~ 03:29)</option>
      <option value="4">인시 (03:30 ~ 05:29)</option>
      <option value="6">묘시 (05:30 ~ 07:29)</option>
      <option value="8">진시 (07:30 ~ 09:29)</option>
      <option value="10">사시 (09:30 ~ 11:29)</option>
      <option value="12" selected>오시 (11:30 ~ 13:29)</option>
      <option value="14">미시 (13:30 ~ 15:29)</option>
      <option value="16">신시 (15:30 ~ 17:29)</option>
      <option value="18">유시 (17:30 ~ 19:29)</option>
      <option value="20">술시 (19:30 ~ 21:29)</option>
      <option value="22">해시 (21:30 ~ 23:29)</option>
    </select>
  </div>

  <button onclick="calculateSaju()">내 운세 데이터 생성</button>

  <div id="resultArea" class="hidden">
    <div class="result-card" id="resultDisplay"></div>
    <textarea id="promptBox" readonly></textarea>
    <button onclick="copyPrompt()" style="background:#27ae60;">프롬프트 복사하기</button>
    <p id="copyMsg" style="text-align:center; font-size:12px; color:green;"></p>
  </div>
</div>

<script>
const stems = ["갑", "을", "병", "정", "무", "기", "경", "신", "임", "계"];
const branches = ["자", "축", "인", "묘", "진", "사", "오", "미", "신", "유", "술", "해"];
const cycle = Array.from({length: 60}, (_, i) => stems[i % 10] + branches[i % 12]);

/**
 * 정교한 일주 계산 (기준점: 1900년 1월 1일 갑술일)
 * 한국 시간 보정 및 야자시(23시) 반영
 */
function getSajuData(dateObj, hour) {
    let targetDate = new Date(dateObj);
    
    // 1. 야자시 보정: 밤 23시부터는 다음 날 일주를 사용
    if (hour >= 23) {
        targetDate.setDate(targetDate.getDate() + 1);
    }

    // 2. 일주(Day) 계산
    const baseDate = new Date(1900, 0, 1); // 기준일
    const diffDays = Math.floor((targetDate - baseDate) / (1000 * 60 * 60 * 24));
    let dayIdx = (diffDays + 10) % 60; // 1900-01-01은 갑술(10번)
    if (dayIdx < 0) dayIdx += 60;
    const dayPillar = cycle[dayIdx];

    // 3. 월주(Month) 계산 (단순 월이 아닌 절기 기준 근사치 계산)
    // 실제로는 절기일을 데이터베이스화해야 정확하지만, 여기서는 근사 로직 적용
    const month = targetDate.getMonth() + 1;
    const year = targetDate.getFullYear();
    const yearIdx = (year - 4) % 60;
    const yearPillar = cycle[yearIdx];

    // 월건 계산 (갑기야갑자... 공식 적용)
    const monthStems = ["병", "무", "경", "임", "갑"]; // 년간에 따른 1월 천간 시작
    const startStemIdx = stems.indexOf(yearPillar[0]) % 5;
    const monthStemStart = stems.indexOf(monthStems[startStemIdx]);
    const monthBranchIdx = (month + 1) % 12; // 인(1월)부터 시작
    const monthPillar = stems[(monthStemStart + month - 1) % 10] + branches[monthBranchIdx];

    // 4. 시주(Hour) 계산
    const dayStemIdx = stems.indexOf(dayPillar[0]);
    const hourBranchIdx = Math.floor(((hour + 1) % 24) / 2);
    const hourStemIdx = (dayStemIdx % 5 * 2 + hourBranchIdx) % 10;
    const hourPillar = stems[hourStemIdx] + branches[hourBranchIdx];

    return { yearPillar, monthPillar, dayPillar, hourPillar };
}

function calculateSaju() {
    const birthInput = document.getElementById('birthDate').value;
    if (!birthInput) return alert("날짜를 선택해주세요.");

    const [y, m, d] = birthInput.split("-").map(Number);
    const hour = parseInt(document.getElementById('timeRange').value);
    
    // 내 사주 계산
    const mySaju = getSajuData(new Date(y, m - 1, d), hour);
    
    // 오늘 사주 계산
    const now = new Date();
    const todaySaju = getSajuData(now, now.getHours());

    const resultHTML = `
        <strong>[나의 사주 정보]</strong><br>
        연주: ${mySaju.yearPillar} | 월주: ${mySaju.monthPillar}<br>
        일주: <b>${mySaju.dayPillar}</b> | 시주: ${mySaju.hourPillar}<br><br>
        <strong>[오늘의 기운]</strong><br>
        날짜: ${now.toLocaleDateString()}<br>
        오늘의 일주: <b>${todaySaju.dayPillar}</b>
    `;

    const promptText = `나의 사주는 연주:${mySaju.yearPillar}, 월주:${mySaju.monthPillar}, 일주:${mySaju.dayPillar}, 시주:${mySaju.hourPillar}이야. 
오늘의 일주는 ${todaySaju.dayPillar}야. 

이 정보를 바탕으로 나의 타고난 성격 특징과 오늘의 운세(연애, 금전, 직장)를 명리학적으로 자세히 분석해줘.`;

    document.getElementById('resultDisplay').innerHTML = resultHTML;
    document.getElementById('promptBox').value = promptText;
    document.getElementById('resultArea').classList.remove('hidden');
}

function copyPrompt() {
    const box = document.getElementById('promptBox');
    box.select();
    navigator.clipboard.writeText(box.value);
    document.getElementById('copyMsg').innerText = "프롬프트가 복사되었습니다! AI에게 질문해보세요.";
}
</script>
</body>
</html>
