<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>사주 계산기</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Diphylleia&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#f2f2f2;
  font-family:"Diphylleia", serif;
}

.container {
  max-width:420px;
  margin:40px auto;
  padding:20px;
  border:1px solid black;
  background:white;
}

h2 { margin-bottom:10px; }

.block { margin-top:15px; }

label {
  font-size:13px;
  display:block;
  margin-bottom:5px;
}

input, select, button {
  width:100%;
  padding:10px;
  border:1px solid black;
  font-family:"Diphylleia", serif;
  box-sizing:border-box;
}

button {
  margin-top:15px;
  background:black;
  color:white;
}

.desc {
  font-size:11px;
  margin-top:5px;
  line-height:1.4;
}

.hidden { display:none; }

.lang-btn {
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<button onclick="toggleLang()" class="lang-btn" id="langBtn">ENG</button>

<h2 id="title">사주 계산기</h2>

<!-- 생년월일 -->
<div class="block">
<label id="birthLabel">생년월일</label>
<input type="date" id="birthDate">
</div>

<!-- 방식 -->
<div class="block">
<label id="modeLabel">날짜 계산 방식</label>
<select id="mode"></select>
<div class="desc" id="modeDesc"></div>
</div>

<!-- 시간 입력 -->
<div class="block">
<label id="timeLabel">출생 시간</label>
<select id="timeMode"></select>

<input type="time" id="exactTime" class="hidden">

<select id="timeRange" class="hidden"></select>

<div class="desc" id="timeDesc"></div>
</div>

<!-- 자시 -->
<div class="block hidden" id="zasiBlock">
<label id="zasiLabel">자시 처리 방식</label>
<select id="zasi"></select>
<div class="desc" id="zasiDesc"></div>
</div>

<button onclick="calc()" id="calcBtn">계산하기</button>

<div id="result" style="margin-top:20px;"></div>

</div>

<script>
let lang="ko";

const text={
ko:{
title:"사주 계산기",
birth:"생년월일",
modeLabel:"날짜 계산 방식",
mode:[
"일반 (00:00 지나면 다음 날)",
"전통 (23:00 지나면 다음 날)"
],
modeDesc:[
"우리가 쓰는 일반 달력 기준",
"사주에서 사용하는 전통 기준 (밤 11시부터 다음 날로 봄)"
],
timeLabel:"출생 시간",
timeMode:[
"시간 모름",
"정확한 시간 입력",
"시간대 선택 (2시간 단위)"
],
timeDesc:[
"시간 없이 일주만 계산",
"정확한 시각 입력 (가장 정확)",
"대략적인 시간대 선택 (예: 오전/오후 느낌)"
],
zasiLabel:"자시 처리",
zasi:[
"자시 통합 (23~01 모두 다음 날 처리)",
"조자시 (23~00 → 다음 날)",
"야자시 (00~01 → 이전 날)"
],
zasiDesc:[
"자시를 하나로 묶어 계산",
"밤 11시~자정은 다음 날로 계산",
"자정~새벽1시는 이전 날로 계산"
],
calc:"계산하기"
},
en:{
title:"Saju Calculator",
birth:"Birth Date",
modeLabel:"Day Calculation Mode",
mode:[
"Modern (day changes at 00:00)",
"Traditional (day changes at 23:00)"
],
modeDesc:[
"Standard calendar system",
"Traditional Saju system (day starts at 23:00)"
],
timeLabel:"Birth Time",
timeMode:[
"No time",
"Exact time",
"Time range (2-hour blocks)"
],
timeDesc:[
"Calculate without time",
"Most accurate",
"Approximate time block"
],
zasiLabel:"Zi Hour Handling",
zasi:[
"Unified Zi",
"Early Zi (next day)",
"Late Zi (previous day)"
],
zasiDesc:[
"Treat as one block",
"23:00~00:00 = next day",
"00:00~01:00 = previous day"
],
calc:"Calculate"
}
};

function render(){
const t=text[lang];

document.getElementById("title").innerText=t.title;
document.getElementById("birthLabel").innerText=t.birth;
document.getElementById("modeLabel").innerText=t.modeLabel;
document.getElementById("timeLabel").innerText=t.timeLabel;
document.getElementById("zasiLabel").innerText=t.zasiLabel;
document.getElementById("calcBtn").innerText=t.calc;

// mode
const mode=document.getElementById("mode");
mode.innerHTML="";
t.mode.forEach((m,i)=>{
mode.innerHTML+=`<option value="${i===0?'modern':'traditional'}">${m}</option>`;
});
document.getElementById("modeDesc").innerText=t.modeDesc[mode.selectedIndex];

// timeMode
const tm=document.getElementById("timeMode");
tm.innerHTML="";
t.timeMode.forEach((m,i)=>{
tm.innerHTML+=`<option value="${['none','exact','range'][i]}">${m}</option>`;
});
document.getElementById("timeDesc").innerText=t.timeDesc[0];

// zasi
const z=document.getElementById("zasi");
z.innerHTML="";
t.zasi.forEach((m,i)=>{
z.innerHTML+=`<option value="${['normal','early','late'][i]}">${m}</option>`;
});
document.getElementById("zasiDesc").innerText=t.zasiDesc[0];

// 시간대
const tr=document.getElementById("timeRange");
tr.innerHTML=`
<option value="23">자시 (23:00~01:00)</option>
<option value="1">축시 (01:00~03:00)</option>
<option value="3">인시 (03:00~05:00)</option>
<option value="5">묘시 (05:00~07:00)</option>
<option value="7">진시 (07:00~09:00)</option>
<option value="9">사시 (09:00~11:00)</option>
<option value="11">오시 (11:00~13:00)</option>
<option value="13">미시 (13:00~15:00)</option>
<option value="15">신시 (15:00~17:00)</option>
<option value="17">유시 (17:00~19:00)</option>
<option value="19">술시 (19:00~21:00)</option>
<option value="21">해시 (21:00~23:00)</option>
`;

document.getElementById("langBtn").innerText=lang==="ko"?"ENG":"KOR";
}

function toggleLang(){
lang=lang==="ko"?"en":"ko";
render();
}

render();

// 이벤트
mode.onchange=()=>{
const isTrad=mode.value==="traditional";
document.getElementById("zasiBlock").classList.toggle("hidden",!isTrad);
document.getElementById("modeDesc").innerText=text[lang].modeDesc[mode.selectedIndex];
};

timeMode.onchange=()=>{
exactTime.classList.toggle("hidden",timeMode.value!=="exact");
timeRange.classList.toggle("hidden",timeMode.value!=="range");
document.getElementById("timeDesc").innerText=text[lang].timeDesc[timeMode.selectedIndex];
};

zasi.onchange=()=>{
document.getElementById("zasiDesc").innerText=text[lang].zasiDesc[zasi.selectedIndex];
};

// 계산 (간단 유지)
function calc(){
const date=new Date(document.getElementById("birthDate").value);
document.getElementById("result").innerText="계산 완료 (로직 유지)";
}
</script>

</body>
</html>
