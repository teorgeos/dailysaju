<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>오늘의 일주 계산기</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      width: 320px;
    }

    h2 {
      margin-bottom: 20px;
      font-size: 20px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    button {
      background: black;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 15px;
    }

    .result {
      margin-top: 20px;
      font-size: 16px;
    }

    .highlight {
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>일주 계산기</h2>

  <label>생년월일</label>
  <input type="date" id="birthDate">

  <label>출생 시간 (선택)</label>
  <input type="time" id="birthTime">

  <button onclick="calculate()">계산하기</button>

  <div class="result">
    <p>당신의 일주: <span id="userResult" class="highlight">-</span></p>
    <p>오늘의 일주: <span id="todayResult" class="highlight">-</span></p>
  </div>
</div>

<script>
  const stems = ["갑","을","병","정","무","기","경","신","임","계"];
  const branches = ["자","축","인","묘","진","사","오","미","신","유","술","해"];

  const sexagenary = Array.from({ length: 60 }, (_, i) => {
    return stems[i % 10] + branches[i % 12];
  });

  // 기준일: 2026-05-25 = 기해
  const baseDate = new Date("2026-05-25");
  const baseIndex = sexagenary.indexOf("기해");

  function getDayPillar(date) {
    const diff = Math.floor((date - baseDate) / (1000 * 60 * 60 * 24));
    let index = (baseIndex + diff) % 60;
    if (index < 0) index += 60;
    return sexagenary[index];
  }

  function getTodayPillar() {
    const today = new Date();
    return getDayPillar(today);
  }

  function calculate() {
    const input = document.getElementById("birthDate").value;

    if (!input) {
      alert("생년월일을 입력하세요");
      return;
    }

    const date = new Date(input);
    const result = getDayPillar(date);

    document.getElementById("userResult").innerText = result;
  }

  // 페이지 로드 시 오늘 일주 표시
  document.getElementById("todayResult").innerText = getTodayPillar();
</script>

</body>
</html>
