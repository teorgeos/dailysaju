<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>일주 운세</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 폰트 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Diphylleia&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #f2f2f2;
  font-family: "Diphylleia", serif;
}

.container {
  max-width: 420px;
  margin: 40px auto;
  padding: 20px;
  background: white;
  border: 1px solid #000;
}

h1 {
  font-size: 22px;
  margin-bottom: 10px;
}

hr {
  border: none;
  border-top: 1px solid #000;
  margin: 15px 0;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: 1px solid #000;
  background: white;
  font-family: "Diphylleia", serif;
}

button {
  background: black;
  color: white;
  cursor: pointer;
}

.section {
  margin-top: 20px;
}

.label {
  font-size: 13px;
  margin-top: 10px;
}

.heart {
  color: #ccc;
  font-size: 18px;
}

.filled {
  color: black;
}

.fortune-item {
  margin-top: 15px;
}

.desc {
  font-size: 12px;
  margin-top: 5px;
}

.small {
  font-size: 11px;
  margin-top: 10px;
  line-height: 1.5;
}
</style>
</head>

<body>

<div class="container">

<h1>DAY PILLAR</h1>

<div id="today"></div>
<div id="todayPillar"></div>

<hr>

<div class="section">
  <div class="label">BIRTH DATE</div>
  <input type="date" id="birthDate">

  <div class="label">CALCULATION MODE</div>
  <select id="mode">
    <option value="modern">일반 (자정 기준)</option>
    <option value="traditional">전통 (23시 기준)</option>
  </select>

  <div class="label">ZI MODE</div>
  <select id="zasi">
    <option value="normal">자시 (23~01)</option>
    <option value="early">조자시 (23~00 → 다음날)</option>
    <option value="late">야자시 (00~01 → 이전날)</option>
  </select>

  <button onclick="calculate()">CALCULATE</button>
</div>

<hr>

<div id="result"></div>

<div class="small">
※ 전통 방식은 밤 11시부터 날짜가 바뀝니다.<br>
※ 자시 구간에 따라 하루 해석이 달라질 수 있습니다.
</div>

</div>

<script>
const stems = ["갑","을","병","정","무","기","경","신","임","계"];
const branches = ["자","축","인","묘","진","사","오","미","신","유","술","해"];

const sexagenary = Array.from({ length: 60 }, (_, i) =>
  stems[i % 10] + branches[i % 12]
);

// 기준일
const baseDate = new Date("2026-04-10");
const baseIndex = sexagenary.indexOf("갑인");

function adjust(date, mode, zasi) {
  let d = new Date(date);

  if (mode === "traditional") {
    const h = d.getHours();

    if (h >= 23 && (zasi === "normal" || zasi === "early")) {
      d.setDate(d.getDate() + 1);
    }

    if (h < 1 && zasi === "late") {
      d.setDate(d.getDate() - 1);
    }
  }

  return d;
}

function getPillar(date, mode, zasi) {
  const d = adjust(date, mode, zasi);
  const diff = Math.floor((d - baseDate)/(1000*60*60*24));
  let idx = (baseIndex + diff)%60;
  if (idx<0) idx+=60;
  return sexagenary[idx];
}

// 점수
function getScore(a, b) {
  if (a === b) return 5;
  const diff = Math.abs(stems.indexOf(a) - stems.indexOf(b));
  return Math.max(1, 5 - diff);
}

// 하트
function hearts(score) {
  let h = "";
  for (let i=1;i<=5;i++) {
    h += `<span class="heart ${i<=score?'filled':''}">♥</span>`;
  }
  return h;
}

// 설명
function desc(type, score) {
  const map = {
    love:["감정 충돌 가능","조심 필요","보통","호감 상승","강한 인연"],
    money:["손실 주의","지출 관리","보통","수입 기대","재물 상승"],
    relation:["갈등 가능","오해 주의","무난","좋은 교류","인기 상승"],
    job:["집중 어려움","변수 많음","보통","기회 있음","성과 상승"],
    move:["불안정","변화 주의","보통","이동 좋음","큰 기회"]
  };
  return map[type][score-1];
}

function calculate() {
  const date = new Date(document.getElementById("birthDate").value);
  const mode = document.getElementById("mode").value;
  const zasi = document.getElementById("zasi").value;

  const my = getPillar(date, mode, zasi);
  const today = getPillar(new Date(), mode, zasi);

  const myStem = my[0];
  const todayStem = today[0];

  const scores = {
    love: getScore(myStem, todayStem),
    money: getScore(todayStem, myStem),
    relation: getScore(myStem, todayStem)-1,
    job: getScore(myStem, todayStem)-1,
    move: getScore(myStem, todayStem)
  };

  let html = `<div><b>YOU: ${my}</b><br><b>TODAY: ${today}</b></div>`;

  for (let k in scores) {
    let s = Math.max(1, Math.min(5, scores[k]));
    html += `
    <div class="fortune-item">
      <div>${k.toUpperCase()}</div>
      ${hearts(s)}
      <div class="desc">${desc(k,s)}</div>
    </div>`;
  }

  document.getElementById("result").innerHTML = html;
}

// 초기 표시
document.getElementById("today").innerText =
  "TODAY: " + new Date().toLocaleDateString();

document.getElementById("todayPillar").innerText =
  "DAY PILLAR: " + getPillar(new Date(),"modern","normal");
</script>

</body>
</html>
