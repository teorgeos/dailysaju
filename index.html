<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>사주 계산기</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Diphylleia&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#f2f2f2;
  font-family:"Diphylleia", serif;
}

.container {
  max-width:420px;
  margin:40px auto;
  padding:20px;
  border:1px solid black;
  background:white;
}

h2 { margin-bottom:10px; }

.block { margin-top:15px; }

label {
  font-size:13px;
  display:block;
  margin-bottom:5px;
}

input, select, button {
  width:100%;
  padding:10px;
  border:1px solid black;
  font-family:"Diphylleia", serif;
  box-sizing:border-box;
}

button {
  margin-top:15px;
  background:black;
  color:white;
}

.desc {
  font-size:11px;
  margin-top:5px;
  line-height:1.4;
}

.hidden { display:none; }

.lang-btn {
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<button onclick="toggleLang()" class="lang-btn" id="langBtn">ENG</button>

<h2 id="title"></h2>

<!-- 생년월일 -->
<div class="block">
<label id="birthLabel"></label>
<input type="date" id="birthDate">
</div>

<!-- 방식 -->
<div class="block">
<label id="modeLabel"></label>
<select id="mode"></select>
<div class="desc" id="modeDesc"></div>
</div>

<!-- 시간 -->
<div class="block">
<label id="timeLabel"></label>
<select id="timeMode"></select>

<input type="time" id="exactTime" class="hidden">
<select id="timeRange" class="hidden"></select>

<div class="desc" id="timeDesc"></div>
</div>

<!-- 자시 -->
<div class="block hidden" id="zasiBlock">
<label id="zasiLabel"></label>
<select id="zasi"></select>
<div class="desc" id="zasiDesc"></div>
</div>

<button onclick="calc()" id="calcBtn"></button>

<div id="result" style="margin-top:20px;"></div>

</div>

<script>
let lang="ko";

const text={
ko:{
title:"사주 계산기",
birth:"생년월일",
modeLabel:"날짜 계산 방식",
mode:[
"일반 (00:00 지나면 다음 날)",
"전통 (23:00 지나면 다음 날)"
],
modeDesc:[
"우리가 쓰는 일반 달력 기준",
"사주 기준 (밤 11시부터 다음 날)"
],
timeLabel:"출생 시간",
timeMode:[
"시간 모름",
"정확한 시간 입력",
"시간대 선택 (2시간 단위)"
],
timeDesc:[
"시간 없이 계산 (기본값 12시 적용)",
"가장 정확한 방법",
"대략적인 시간대 선택"
],
zasiLabel:"자시 처리",
zasi:[
"자시 통합",
"조자시 (23~00 → 다음날)",
"야자시 (00~01 → 이전날)"
],
zasiDesc:"자시: 23~01 / 조자시: 다음날 / 야자시: 이전날",
calc:"계산하기"
},
en:{
title:"Saju Calculator",
birth:"Birth Date",
modeLabel:"Day Calculation",
mode:[
"Modern (day changes at 00:00)",
"Traditional (day changes at 23:00)"
],
modeDesc:[
"Standard calendar",
"Saju traditional rule"
],
timeLabel:"Birth Time",
timeMode:[
"No time",
"Exact time",
"Time range"
],
timeDesc:[
"Uses default 12:00",
"Most accurate",
"Approximate"
],
zasiLabel:"Zi Hour",
zasi:[
"Unified Zi",
"Early Zi",
"Late Zi"
],
zasiDesc:"Zi:23~01 / Early:next / Late:prev",
calc:"Calculate"
}
};

function render(){
const t=text[lang];

title.innerText=t.title;
birthLabel.innerText=t.birth;
modeLabel.innerText=t.modeLabel;
timeLabel.innerText=t.timeLabel;
zasiLabel.innerText=t.zasiLabel;
calcBtn.innerText=t.calc;

mode.innerHTML="";
t.mode.forEach((m,i)=>{
mode.innerHTML+=`<option value="${i===0?'modern':'traditional'}">${m}</option>`;
});
modeDesc.innerText=t.modeDesc[0];

timeMode.innerHTML="";
t.timeMode.forEach((m,i)=>{
timeMode.innerHTML+=`<option value="${['none','exact','range'][i]}">${m}</option>`;
});
timeDesc.innerText=t.timeDesc[0];

zasi.innerHTML="";
t.zasi.forEach((m,i)=>{
zasi.innerHTML+=`<option value="${['normal','early','late'][i]}">${m}</option>`;
});
zasiDesc.innerText=t.zasiDesc;

timeRange.innerHTML=`
<option value="23">자시 (23~01)</option>
<option value="1">축시 (01~03)</option>
<option value="3">인시 (03~05)</option>
<option value="5">묘시 (05~07)</option>
<option value="7">진시 (07~09)</option>
<option value="9">사시 (09~11)</option>
<option value="11">오시 (11~13)</option>
<option value="13">미시 (13~15)</option>
<option value="15">신시 (15~17)</option>
<option value="17">유시 (17~19)</option>
<option value="19">술시 (19~21)</option>
<option value="21">해시 (21~23)</option>
`;

langBtn.innerText=lang==="ko"?"ENG":"KOR";
}

function toggleLang(){
lang=lang==="ko"?"en":"ko";
render();
updateToday();
}

render();

// 이벤트
mode.onchange=()=>{
zasiBlock.classList.toggle("hidden",mode.value!=="traditional");
modeDesc.innerText=text[lang].modeDesc[mode.selectedIndex];
updateToday();
};

timeMode.onchange=()=>{
exactTime.classList.toggle("hidden",timeMode.value!=="exact");
timeRange.classList.toggle("hidden",timeMode.value!=="range");
timeDesc.innerText=text[lang].timeDesc[timeMode.selectedIndex];
};

// ===== 계산 로직 =====

const stems=["갑","을","병","정","무","기","경","신","임","계"];
const branches=["자","축","인","묘","진","사","오","미","신","유","술","해"];

const cycle = Array.from({length:60},(_,i)=>stems[i%10]+branches[i%12]);

const baseDate = new Date("2026-04-10");
const baseIndex = cycle.indexOf("갑인");

function adjust(date,mode,zasi){
let d=new Date(date);
const h=d.getHours();

if(mode==="traditional"){
if(h>=23 && (zasi==="normal"||zasi==="early")) d.setDate(d.getDate()+1);
if(h<1 && zasi==="late") d.setDate(d.getDate()-1);
}
return d;
}

function getDayPillar(date,mode,zasi){
const d=adjust(date,mode,zasi);
const diff=Math.floor((d-baseDate)/(1000*60*60*24));
let idx=(baseIndex+diff)%60;
if(idx<0) idx+=60;
return cycle[idx];
}

function getYearPillar(year){
const y=(year-4)%60;
return cycle[(y+60)%60];
}

function getHourBranch(hour){
return Math.floor((hour+1)/2)%12;
}

function getHourStem(dayStemIndex,hourBranchIndex){
return (dayStemIndex*2 + hourBranchIndex)%10;
}

function getHourPillar(date,dayStem){
const hour=date.getHours();
const hb=getHourBranch(hour);
const ds=stems.indexOf(dayStem);
const hs=getHourStem(ds,hb);
return stems[hs]+branches[hb];
}

function formatDate(date){
return date.toLocaleDateString(lang==="ko"?"ko-KR":"en-US");
}

function updateToday(){
const today=new Date();
const modeVal=mode.value;
const zasiVal=zasi.value||"normal";

const todayPillar=getDayPillar(today,modeVal,zasiVal);

result.innerHTML=
(lang==="ko"
? `오늘 (${formatDate(today)}) 일주: ${todayPillar}`
: `Today (${formatDate(today)}) Day Pillar: ${todayPillar}`
);
}

updateToday();

function calc(){

const input=birthDate.value;
if(!input) return alert(lang==="ko"?"날짜 입력":"Enter date");

let date=new Date(input);

const modeVal=mode.value;
const zasiVal=zasi.value||"normal";
const timeModeVal=timeMode.value;

if(timeModeVal==="exact"){
const t=exactTime.value;
if(t){
const [h,m]=t.split(":");
date.setHours(parseInt(h),parseInt(m));
}
}

if(timeModeVal==="range"){
date.setHours(parseInt(timeRange.value));
}

if(timeModeVal==="none"){
date.setHours(12);
}

const day=getDayPillar(date,modeVal,zasiVal);
const year=getYearPillar(date.getFullYear());
const hour=getHourPillar(date,day[0]);

result.innerHTML=`
<div style="line-height:1.6">
<b>${lang==="ko"?"연주":"Year"}:</b> ${year}<br>
<span style="font-size:11px;">${lang==="ko"?"태어난 해의 기운":"Year energy"}</span><br><br>

<b>${lang==="ko"?"일주":"Day"}:</b> ${day}<br>
<span style="font-size:11px;">${lang==="ko"?"자신의 핵심 성격":"Core self"}</span><br><br>

<b>${lang==="ko"?"시주":"Hour"}:</b> ${hour}<br>
<span style="font-size:11px;">${lang==="ko"?"시간 기반 성향 / 후반 흐름":"Later life"}</span>
</div>
`;
}
</script>

</body>
</html>
