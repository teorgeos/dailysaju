<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>사주 계산기</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Diphylleia&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#f2f2f2;
  font-family:"Diphylleia", serif;
}

.container {
  max-width:420px;
  margin:40px auto;
  padding:20px;
  border:1px solid black;
  background:white;
}

.block { margin-top:15px; }

label { font-size:13px; display:block; margin-bottom:5px; }

input, select, button, textarea {
  width:100%;
  padding:10px;
  border:1px solid black;
  font-family:"Diphylleia", serif;
  box-sizing:border-box;
}

button { margin-top:15px; background:black; color:white; }

.desc { font-size:11px; margin-top:5px; line-height:1.4; }

.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<h2>사주 계산기</h2>

<div class="block">
<label>생년월일</label>
<input type="date" id="birthDate">
</div>

<div class="block">
<label>날짜 계산 방식</label>
<select id="mode">
<option value="modern">일반 (00:00 기준)</option>
<option value="traditional">전통 (23:00 기준)</option>
</select>
<div class="desc">
👉 밤 11시 이후 출생이면 전통 선택 권장
</div>
</div>

<div class="block">
<label>출생 시간</label>
<select id="timeMode">
<option value="none">모름</option>
<option value="exact">정확한 시간</option>
<option value="range">시간대 선택</option>
</select>

<input type="time" id="exactTime" class="hidden">

<select id="timeRange" class="hidden">
<option value="23">자시 (23:00~01:00)</option>
<option value="1">축시 (01:00~03:00)</option>
<option value="3">인시 (03:00~05:00)</option>
<option value="5">묘시 (05:00~07:00)</option>
<option value="7">진시 (07:00~09:00)</option>
<option value="9">사시 (09:00~11:00)</option>
<option value="11">오시 (11:00~13:00)</option>
<option value="13">미시 (13:00~15:00)</option>
<option value="15">신시 (15:00~17:00)</option>
<option value="17">유시 (17:00~19:00)</option>
<option value="19">술시 (19:00~21:00)</option>
<option value="21">해시 (21:00~23:00)</option>
</select>

<div class="desc">
👉 시간 모르면 “모름” 선택 (낮 12시 처리)
</div>
</div>

<div class="block hidden" id="zasiBlock">
<label>자시 처리</label>
<select id="zasi">
<option value="normal">자시 통합</option>
<option value="early">조자시</option>
<option value="late">야자시</option>
</select>
</div>

<button onclick="calc()">계산</button>

<div id="result" style="margin-top:20px;"></div>

<div style="margin-top:20px;">
  <button onclick="copyPrompt()">프롬프트 복사</button>
  <textarea id="promptBox" style="margin-top:10px; height:150px;"></textarea>
</div>

</div>

<script>

// ===== 기본 =====
const stems=["갑","을","병","정","무","기","경","신","임","계"];
const branches=["자","축","인","묘","진","사","오","미","신","유","술","해"];
const cycle = Array.from({length:60},(_,i)=>stems[i%10]+branches[i%12]);

const baseDate = new Date("1984-02-02T00:00:00");
const baseIndex = 0;

// ===== 연주 =====
function getYear(date){
  const y = date.getFullYear();
  const ipchun = new Date(y,1,4);
  return date < ipchun ? y-1 : y;
}

function getYearPillar(date){
  const year = getYear(date);
  const idx = (year - 4) % 60;
  return cycle[(idx+60)%60];
}

// ===== 월주 =====
function getMonthPillar(date, yearStemIndex){
  const monthBranchIndex = (date.getMonth()+2)%12;
  const monthStemIndex = (yearStemIndex*2 + monthBranchIndex)%10;
  return stems[monthStemIndex]+branches[monthBranchIndex];
}

// ===== 자시 =====
function adjust(date,mode,zasi){
  let d=new Date(date);
  const h=d.getHours();

  if(mode==="traditional"){
    if(h>=23 && (zasi==="normal"||zasi==="early")) d.setDate(d.getDate()+1);
    if(h<1 && zasi==="late") d.setDate(d.getDate()-1);
  }
  return d;
}

// ===== 일주 =====
function getDayPillar(date,mode,zasi){
  const d=adjust(date,mode,zasi);
  const diff=Math.floor((d-baseDate)/(1000*60*60*24));
  let idx=(baseIndex + diff)%60;
  if(idx<0) idx+=60;
  return cycle[idx];
}

// ===== 시주 =====
function getHourBranch(hour){
  return Math.floor((hour+1)/2)%12;
}

function getHourStem(dayStemIndex,hourBranchIndex){
  return (dayStemIndex*2 + hourBranchIndex)%10;
}

function getHourPillar(date,dayStem){
  const hour=date.getHours();
  const hb=getHourBranch(hour);
  const ds=stems.indexOf(dayStem);
  const hs=getHourStem(ds,hb);
  return stems[hs]+branches[hb];
}

// ===== UI =====
timeMode.onchange=()=>{
  exactTime.classList.toggle("hidden",timeMode.value!=="exact");
  timeRange.classList.toggle("hidden",timeMode.value!=="range");
};

mode.onchange=()=>{
  zasiBlock.classList.toggle("hidden",mode.value!=="traditional");
};

// ===== 계산 =====
function calc(){

  const input=birthDate.value;
  if(!input) return alert("날짜 입력");

  let date=new Date(input);

  const modeVal=mode.value;
  const zasiVal=zasi.value||"normal";
  const timeModeVal=timeMode.value;

  if(timeModeVal==="exact"){
    const t=exactTime.value;
    if(t){
      const [h,m]=t.split(":");
      date.setHours(h,m);
    }
  }

  if(timeModeVal==="range"){
    date.setHours(parseInt(timeRange.value));
  }

  if(timeModeVal==="none"){
    date.setHours(12);
  }

  const yearP = getYearPillar(date);
  const yearStemIndex = stems.indexOf(yearP[0]);
  const monthP = getMonthPillar(date, yearStemIndex);
  const dayP = getDayPillar(date,modeVal,zasiVal);
  const hourP = getHourPillar(date,dayP[0]);

  window.lastResult = { year:yearP, month:monthP, day:dayP, hour:hourP };

  result.innerHTML=`
  <b>연주:</b> ${yearP}<br><br>
  <b>월주:</b> ${monthP}<br><br>
  <b>일주:</b> ${dayP}<br><br>
  <b>시주:</b> ${hourP}
  `;
}

// ===== 프롬프트 =====
function generatePrompt(){

  if(!window.lastResult) return "먼저 계산하세요";

  const {year, month, day, hour} = window.lastResult;

  const today = new Date().toISOString().split("T")[0];

  return `나의 일간은 '${day}'이고, 연주는 '${year}', 월주는 '${month}', 시주는 '${hour}'이야.
오늘은 '${today}'이야.

내 운세를 아래 항목으로 나눠서 구체적으로 분석해줘:
- 연애운
- 인간관계
- 금전운
- 직장/취업운

가능하면 현실적인 조언 중심으로 써줘.`;
}

function copyPrompt(){
  const prompt = generatePrompt();
  document.getElementById("promptBox").value = prompt;

  navigator.clipboard.writeText(prompt)
    .then(()=> alert("복사됨"))
    .catch(()=> alert("복사 실패"));
}

</script>

</body>
</html>
