<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>사주 계산기</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Diphylleia&display=swap" rel="stylesheet">

<style>
body {
  font-family: "Diphylleia", serif;
  background:#f2f2f2;
  margin:0;
}

.container {
  max-width:420px;
  margin:40px auto;
  padding:20px;
  border:1px solid black;
  background:white;
}

input, select, button {
  width:100%;
  margin-top:10px;
  padding:10px;
  border:1px solid black;
  font-family:"Diphylleia", serif;
}

.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<h2>사주 계산</h2>

<input type="date" id="birthDate">

<select id="mode">
<option value="modern">일반 (자정 기준)</option>
<option value="traditional">전통 (23시 기준)</option>
</select>

<select id="timeMode">
<option value="none">시간 모름</option>
<option value="exact">시간 입력</option>
<option value="range">시간대 선택</option>
</select>

<input type="time" id="exactTime" class="hidden">

<select id="timeRange" class="hidden">
<option value="23">자시</option>
<option value="1">축시</option>
<option value="3">인시</option>
<option value="5">묘시</option>
<option value="7">진시</option>
<option value="9">사시</option>
<option value="11">오시</option>
<option value="13">미시</option>
<option value="15">신시</option>
<option value="17">유시</option>
<option value="19">술시</option>
<option value="21">해시</option>
</select>

<select id="zasi" class="hidden">
<option value="normal">자시</option>
<option value="early">조자시</option>
<option value="late">야자시</option>
</select>

<button onclick="calc()">계산</button>

<div id="result"></div>

</div>

<script>
const stems=["갑","을","병","정","무","기","경","신","임","계"];
const branches=["자","축","인","묘","진","사","오","미","신","유","술","해"];

const cycle = Array.from({length:60},(_,i)=>stems[i%10]+branches[i%12]);

const baseDate = new Date("2026-04-10");
const baseIndex = cycle.indexOf("갑인");

// 시지 계산
function getHourBranch(hour){
  return Math.floor((hour+1)/2)%12;
}

// 시천간 계산
function getHourStem(dayStemIndex, hourBranchIndex){
  return (dayStemIndex*2 + hourBranchIndex)%10;
}

function adjust(date,mode,zasi){
  let d=new Date(date);
  const h=d.getHours();

  if(mode==="traditional"){
    if(h>=23 && (zasi==="normal"||zasi==="early")) d.setDate(d.getDate()+1);
    if(h<1 && zasi==="late") d.setDate(d.getDate()-1);
  }
  return d;
}

function getDayPillar(date,mode,zasi){
  const d=adjust(date,mode,zasi);
  const diff=Math.floor((d-baseDate)/(1000*60*60*24));
  let idx=(baseIndex+diff)%60;
  if(idx<0) idx+=60;
  return cycle[idx];
}

// 연주
function getYearPillar(year){
  const y = (year - 4) % 60;
  return cycle[(y+60)%60];
}

// 월주 (근사)
function getMonthPillar(yearStemIndex, month){
  return stems[(yearStemIndex*2 + month)%10] + branches[(month+1)%12];
}

function calc(){

  const input=document.getElementById("birthDate").value;
  if(!input) return alert("날짜 입력");

  let date=new Date(input);

  const mode=document.getElementById("mode").value;
  const zasi=document.getElementById("zasi").value;

  const timeMode=document.getElementById("timeMode").value;

  if(timeMode==="exact"){
    const t=document.getElementById("exactTime").value;
    if(t){
      const [h,m]=t.split(":");
      date.setHours(h,m);
    }
  }

  if(timeMode==="range"){
    const h=document.getElementById("timeRange").value;
    date.setHours(h);
  }

  // 계산
  const day = getDayPillar(date,mode,zasi);

  const year = getYearPillar(date.getFullYear());

  const yearStemIndex = stems.indexOf(year[0]);

  const month = getMonthPillar(yearStemIndex, date.getMonth()+1);

  let hour = date.getHours();
  const hourBranchIndex = getHourBranch(hour);
  const dayStemIndex = stems.indexOf(day[0]);

  const hourStemIndex = getHourStem(dayStemIndex, hourBranchIndex);

  const hourPillar = stems[hourStemIndex] + branches[hourBranchIndex];

  document.getElementById("result").innerHTML = `
  <b>연주:</b> ${year}<br>
  <b>월주:</b> ${month}<br>
  <b>일주:</b> ${day}<br>
  <b>시주:</b> ${hourPillar}
  `;
}

// UI
document.getElementById("timeMode").addEventListener("change",()=>{
  const m=document.getElementById("timeMode").value;
  document.getElementById("exactTime").classList.toggle("hidden",m!=="exact");
  document.getElementById("timeRange").classList.toggle("hidden",m!=="range");
});

document.getElementById("mode").addEventListener("change",()=>{
  const t=document.getElementById("mode").value==="traditional";
  document.getElementById("zasi").classList.toggle("hidden",!t);
});
</script>

</body>
</html>
